<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab44 — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#f2f3f5;--surface:#fff;--surface2:#f7f8fa;--border:#d8dce3;--border-hi:#b8bec9;--text:#1c2128;--text-muted:#5a6272;--text-light:#9099a8;--accent:#2a5bd7;--accent-dim:rgba(42,91,215,.08);--accent-hover:#1e4ec2;--success:#2e7d4f;--success-bg:#f0f7f3;--success-bd:#b6d9c5;--error:#b91c1c;--error-bg:#fdf2f2;--error-bd:#f9c9c9;--mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif;--radius:8px;--radius-sm:5px;--shadow:0 1px 2px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.07);--tr:0.16s ease}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    .page{flex:1;display:flex;flex-direction:column;align-items:center;padding:52px 16px 64px}
    .header{text-align:center;margin-bottom:28px;animation:fadeDown .4s ease both}
    .lab-tag{display:inline-block;font-family:var(--mono);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-light);border:1px solid var(--border);border-radius:99px;padding:4px 14px;margin-bottom:16px;background:var(--surface)}
    .header h1{font-size:1.6rem;font-weight:600;letter-spacing:-.01em}
    .header p{margin-top:5px;font-size:.85rem;color:var(--text-muted)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px;width:100%;max-width:440px;animation:fadeUp .4s ease both}
    .section-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-light);margin-bottom:18px;display:flex;align-items:center;gap:10px}
    .section-title::after{content:"";flex:1;height:1px;background:var(--border)}
    .field{margin-bottom:14px}
    label{display:block;font-size:.8rem;font-weight:500;margin-bottom:6px}
    label .req{color:var(--text-light);font-weight:400;margin-left:2px}
    input[type=text]{width:100%;padding:9px 12px;font-family:var(--sans);font-size:.875rem;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
    input.err{border-color:var(--error)}
    .field-err{margin-top:5px;font-size:.73rem;color:var(--error);display:none;align-items:center;gap:4px}
    .alert{padding:11px 14px;border-radius:var(--radius-sm);font-size:.82rem;margin-bottom:16px;display:none;line-height:1.5}
    .alert.show{display:block;animation:fadeIn .2s ease}
    .alert-error{background:var(--error-bg);border:1px solid var(--error-bd);color:var(--error)}
    .alert-success{background:var(--success-bg);border:1px solid var(--success-bd);color:var(--success)}
    .closed-banner{text-align:center;padding:32px 20px}
    .closed-icon{width:48px;height:48px;border-radius:50%;background:var(--error-bg);border:1.5px solid var(--error-bd);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .closed-icon svg{stroke:var(--error)}
    .closed-banner h2{font-size:1rem;font-weight:600;margin-bottom:6px}
    .closed-banner p{font-size:.83rem;color:var(--text-muted);line-height:1.6}
    .btn-primary{width:100%;margin-top:22px;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background var(--tr),box-shadow var(--tr),transform .12s;box-shadow:0 1px 3px rgba(42,91,215,.25)}
    .btn-primary:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
    .divider{height:1px;background:var(--border);margin:22px 0}
    .login-link{text-align:center;font-size:.82rem;color:var(--text-muted)}
    .login-link a{color:var(--accent);font-weight:500;text-decoration:none}
    .login-link a:hover{text-decoration:underline}
    .result-banner{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--success-bg);border:1px solid var(--success-bd);border-radius:var(--radius-sm);margin-bottom:20px}
    .result-icon{width:36px;height:36px;border-radius:50%;background:var(--success-bg);border:1.5px solid var(--success-bd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .result-icon svg{stroke:var(--success)}
    .result-banner-text h2{font-size:.9rem;font-weight:600;color:var(--success)}
    .result-banner-text p{font-size:.75rem;color:var(--text-muted);margin-top:2px}
    .info-item{padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
    .info-label{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:3px}
    .info-value{font-size:.85rem;font-weight:500;color:var(--text)}
    .btn-goto{width:100%;margin-top:16px;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background var(--tr)}
    .btn-goto:hover{background:var(--accent-hover)}
    footer{margin-top:24px;font-size:.72rem;color:var(--text-light);text-align:center}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="lab-tag">Lab44 · EE &amp; Networks &amp; Telecom</div>
    <h1>Create Account</h1>
    <p>Register for the first time to access your lab grades</p>
  </header>
  <div class="card" id="card">
    <div id="card-inner"><div style="text-align:center;padding:20px;color:var(--text-light);font-size:.85rem;">Checking registration status…</div></div>
  </div>
  <div class="login-link" style="margin-top:14px;">Already registered? <a href="index.html">Sign in</a></div>
  <footer>© <span id="yr"></span> Lab44</footer>
</div>
<script>
  const _configBase = window.location.origin;
  let API = _configBase + '/api';
  async function loadConfig() {
    try { const r = await fetch(_configBase+'/api/config'); const c=await r.json(); API=c.student_api+'/api'; } catch(_) {}
  }
  document.getElementById('yr').textContent = new Date().getFullYear();
  const FORM_HTML = `
    <div class="section-title">Your information</div>
    <div id="alert" class="alert"></div>
    <form id="form" novalidate>
      <div class="field"><label for="first_name">First Name <span class="req">*</span></label><input type="text" id="first_name" placeholder="e.g. Ahmed"/><div class="field-err" id="err_fn"></div></div>
      <div class="field"><label for="last_name">Last Name <span class="req">*</span></label><input type="text" id="last_name" placeholder="e.g. Benali"/><div class="field-err" id="err_ln"></div></div>
      <div class="field"><label for="student_id">Student ID <span class="req">*</span></label><input type="text" id="student_id" placeholder="e.g. 2024001"/><div class="field-err" id="err_sid"></div></div>
      <button type="submit" class="btn-primary" id="btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Create Account
      </button>
    </form>`;
  const CLOSED_HTML = `
    <div class="closed-banner">
      <div class="closed-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h2>Registration Closed</h2>
      <p>Student registration has been disabled by the administrator.<br>Please contact your instructor to get registered.</p>
    </div>`;
  async function init() {
    await loadConfig();
    try {
      const res = await fetch(`${API}/settings`); const data = await res.json();
      const inner = document.getElementById('card-inner');
      if (data.signup_enabled === 'true') { inner.innerHTML = FORM_HTML; attachForm(); }
      else inner.innerHTML = CLOSED_HTML;
    } catch { document.getElementById('card-inner').innerHTML = `<div style="color:var(--error);padding:20px;text-align:center;font-size:.83rem;">Cannot reach server.</div>`; }
  }
  function attachForm() {
    function fe(id,msg){const e=document.getElementById(id);e.textContent=msg;e.style.display=msg?'flex':'none'}
    function mi(id,s){const e=document.getElementById(id);e.classList.remove('err','ok');if(s)e.classList.add(s)}
    function sa(msg,t='error'){const e=document.getElementById('alert');e.className=`alert alert-${t} show`;e.textContent=msg}
    function ca(){const e=document.getElementById('alert');e.className='alert';e.textContent=''}
    ['first_name','last_name','student_id'].forEach(id=>{
      document.getElementById(id).addEventListener('input',()=>{fe(`err_${id==='first_name'?'fn':id==='last_name'?'ln':'sid'}`,'');mi(id,'');ca()});
    });
    function validate(){
      let ok=true;
      const fn=document.getElementById('first_name').value.trim();
      const ln=document.getElementById('last_name').value.trim();
      const sid=document.getElementById('student_id').value.trim();
      if(!fn||fn.length<2){fe('err_fn','Min 2 chars');mi('first_name','err');ok=false}
      if(!ln||ln.length<2){fe('err_ln','Min 2 chars');mi('last_name','err');ok=false}
      if(!sid||sid.length<3){fe('err_sid','Min 3 chars');mi('student_id','err');ok=false}
      return ok;
    }
    document.getElementById('form').addEventListener('submit',async e=>{
      e.preventDefault(); ca(); if(!validate())return;
      const btn=document.getElementById('btn'); btn.disabled=true; btn.innerHTML=`<span class="spinner"></span> Registering…`;
      try {
        const res=await fetch(`${API}/students/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({first_name:document.getElementById('first_name').value.trim(),last_name:document.getElementById('last_name').value.trim(),student_id:document.getElementById('student_id').value.trim()})});
        const data=await res.json();
        if(!res.ok){sa(data.error||'Registration failed.');btn.disabled=false;btn.innerHTML='Create Account';}
        else{
          sessionStorage.setItem('lab44_role','student');sessionStorage.setItem('lab44_student',JSON.stringify(data.student));
          document.getElementById('card-inner').innerHTML=`
            <div class="result-banner"><div class="result-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="result-banner-text"><h2>Account created!</h2><p>Welcome to Lab44, ${data.student.first_name}.</p></div></div>
            <div class="info-item"><div class="info-label">Full Name</div><div class="info-value">${data.student.first_name} ${data.student.last_name}</div></div>
            <div class="info-item"><div class="info-label">Student ID</div><div class="info-value">${data.student.student_id}</div></div>
            <button class="btn-goto" onclick="window.location.href='studentsinterface.html'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Go to My Dashboard</button>`;
        }
      } catch{sa('Cannot reach server.');btn.disabled=false;btn.innerHTML='Create Account';}
    });
  }
  init();
</script>
</body>
</html>
